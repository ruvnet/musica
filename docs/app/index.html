    <style>
      /* Native-feeling install affordance for the real app (not the marketing
         page's styled CTA) — hidden until Chrome/Edge actually offers
         installability, never shown on browsers without beforeinstallprompt.
         See ADR-182. */
      #pwa-install-toast {
        display: none;
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #2a3742;
        background: rgba(10, 13, 17, 0.92);
        backdrop-filter: blur(10px);
        color: #e7f4f1;
        font: 500 13px/1.3 "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        box-shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.6);
      }
      #pwa-install-toast.is-visible {
        display: flex;
      }
      #pwa-install-toast button {
        font: inherit;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #07080b;
        background: linear-gradient(120deg, #6ff4d2, #a081f5);
        border: none;
        border-radius: 5px;
        padding: 7px 12px;
        cursor: pointer;
      }
      #pwa-install-toast .dismiss {
        background: none;
        color: #93a8ab;
        padding: 4px;
        font-weight: 400;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DCnMB9Df.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/three-B7sRoasK.js">
    <link rel="stylesheet" crossorigin href="./assets/index-DGF4a-04.css">
  </head>
  <body>
    <div id="root"></div>
    <div id="pwa-install-toast" role="status">
      <span>Install Musica VJ for one-tap access</span>
      <button type="button" id="pwa-install-btn">Install</button>
      <button type="button" class="dismiss" id="pwa-install-dismiss" aria-label="Dismiss">✕</button>
    </div>
    <script>
      // Registers the app-shell service worker when served over http(s)
      // (a real deployment, e.g. docs/app/) — a no-op inside the Tauri
      // desktop webview's custom protocol, and in local dev. See ADR-182.
      if ("serviceWorker" in navigator && (location.protocol === "http:" || location.protocol === "https:")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }

      // Explicit Chrome/Edge install affordance, on top of the browser's own
      // native install icon. Never shown on browsers without
      // beforeinstallprompt (Safari/Firefox) — no dead button.
      (function () {
        var deferredPrompt = null;
        var toast = document.getElementById("pwa-install-toast");
        var installBtn = document.getElementById("pwa-install-btn");
        var dismissBtn = document.getElementById("pwa-install-dismiss");

        window.addEventListener("beforeinstallprompt", function (event) {
          event.preventDefault();
          deferredPrompt = event;
          if (localStorage.getItem("musicaPwaInstallDismissed") === "1") return;
          toast.classList.add("is-visible");
        });

        installBtn.addEventListener("click", function () {
          if (!deferredPrompt) return;
          var promptEvent = deferredPrompt;
          deferredPrompt = null;
          toast.classList.remove("is-visible");
          promptEvent.prompt();
        });

        dismissBtn.addEventListener("click", function () {
          toast.classList.remove("is-visible");
          localStorage.setItem("musicaPwaInstallDismissed", "1");
        });

        window.addEventListener("appinstalled", function () {
          toast.classList.remove("is-visible");
          deferredPrompt = null;
        });
      })();
    </script>
  </body>
